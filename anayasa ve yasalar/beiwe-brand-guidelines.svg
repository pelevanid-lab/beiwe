<svg viewBox="0 0 1400 1420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .cap { font-family: Georgia, 'Playfair Display', serif; font-size: 19px; fill: #8a8a85; letter-spacing: 0.07em; text-transform: uppercase; }
      .cap-light { font-family: Georgia, 'Playfair Display', serif; font-size: 19px; fill: #9a988f; letter-spacing: 0.07em; text-transform: uppercase; }
      .word { font-family: Georgia, 'Playfair Display', serif; font-size: 70px; fill: #171717; }
      .word-lg { font-family: Georgia, 'Playfair Display', serif; font-size: 46px; fill: #FAFAF8; }
      .sub { font-family: Georgia, 'Playfair Display', serif; font-style: italic; font-size: 20px; fill: #b9b6ab; }
      .hex { font-family: Georgia, serif; font-size: 15px; fill: #6f6d66; }
      .note { font-family: Georgia, serif; font-size: 13px; fill: #9a988f; }
      .grid-line { stroke: #d7d3c6; stroke-width: 0.75; }
    </style>

    <!--
      Core mark v1.2 — rebuilt on an 8px grid:
      bar = 4 units (32px), W stroke = 2 units (16px),
      ellipse radii = 9.5-10.5 units (78-84px), rounded to whole px.
      Optical correction applied: round belly sized ~3% larger than a
      purely mathematical balance would require, so it reads as equal
      weight against the flat vertical bar.
    -->
    <g id="mark">
      <rect x="-88" y="-108" width="32" height="216" rx="16" fill="#171717"/>
      <ellipse cx="20" cy="-48" rx="78" ry="58" fill="#171717"/>
      <ellipse cx="24" cy="50" rx="84" ry="62" fill="#171717"/>
      <path d="M -16,-56 L 8,56 L 32,-8 L 56,56 L 84,-56"
            fill="none" stroke="#D98A26" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g id="mark-mono">
      <rect x="-88" y="-108" width="32" height="216" rx="16" fill="#171717"/>
      <ellipse cx="20" cy="-48" rx="78" ry="58" fill="#171717"/>
      <ellipse cx="24" cy="50" rx="84" ry="62" fill="#171717"/>
      <path d="M -16,-56 L 8,56 L 32,-8 L 56,56 L 84,-56"
            fill="none" stroke="#FAFAF8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g id="mark-reversed">
      <rect x="-88" y="-108" width="32" height="216" rx="16" fill="#FAFAF8"/>
      <ellipse cx="20" cy="-48" rx="78" ry="58" fill="#FAFAF8"/>
      <ellipse cx="24" cy="50" rx="84" ry="62" fill="#FAFAF8"/>
      <path d="M -16,-56 L 8,56 L 32,-8 L 56,56 L 84,-56"
            fill="none" stroke="#D98A26" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="1400" height="1420" fill="#FAFAF8"/>
  <text x="60" y="55" font-family="Georgia, serif" font-size="26" fill="#171717">Beiwe — Marka Kullanım Sayfası</text>
  <text x="60" y="82" class="cap-light" style="fill:#a6a49a">v1.2 · 8px construction grid · optik hizalama uygulandı · ink #171717 · burnt orange #D98A26</text>

  <!-- ROW 1 -->
  <g transform="translate(150,220) scale(0.85)"><use href="#mark"/></g>
  <text x="150" y="330" text-anchor="middle" class="cap">İKON</text>

  <g transform="translate(430,220)">
    <rect x="-105" y="-105" width="210" height="210" rx="44" fill="#171717"/>
    <use href="#mark-reversed" transform="scale(0.66)"/>
  </g>
  <text x="430" y="330" text-anchor="middle" class="cap">UYGULAMA İKONU</text>

  <g transform="translate(750,225) scale(0.62)"><use href="#mark"/></g>
  <text x="900" y="237" class="word">Beiwe</text>
  <text x="820" y="330" text-anchor="middle" class="cap">BİRİNCİL LOCKUP</text>

  <g transform="translate(1180,240)"><text x="0" y="0" text-anchor="middle" class="word">Beiwe</text></g>
  <text x="1180" y="330" text-anchor="middle" class="cap">SADECE KELİME MARKASI</text>

  <!-- ROW 2 -->
  <g transform="translate(150,470) scale(0.85)"><use href="#mark-mono"/></g>
  <text x="150" y="580" text-anchor="middle" class="cap">TEK RENK (DAMGA/BASKI)</text>

  <g transform="translate(430,470)">
    <rect x="-105" y="-105" width="210" height="210" rx="44" fill="#171717"/>
    <use href="#mark-reversed" transform="scale(0.66)"/>
  </g>
  <text x="430" y="580" text-anchor="middle" class="cap">DARK MODE</text>

  <g transform="translate(750,470)">
    <rect x="-105" y="-105" width="210" height="210" rx="44" fill="#FAFAF8" stroke="#e5e2d8" stroke-width="2"/>
    <use href="#mark" transform="scale(0.66)"/>
  </g>
  <text x="750" y="580" text-anchor="middle" class="cap">LIGHT MODE</text>

  <g transform="translate(1080,470)">
    <rect x="-95" y="-115" width="190" height="230" fill="none" stroke="#c9c6bb" stroke-width="1.5" stroke-dasharray="6 6"/>
    <use href="#mark" transform="scale(0.62)"/>
    <line x1="-95" y1="-140" x2="-61" y2="-140" stroke="#c9c6bb" stroke-width="1.5"/>
    <line x1="-95" y1="-148" x2="-95" y2="-115" stroke="#c9c6bb" stroke-width="1"/>
    <line x1="-61" y1="-148" x2="-61" y2="-115" stroke="#c9c6bb" stroke-width="1"/>
  </g>
  <text x="1080" y="580" text-anchor="middle" class="cap">CLEAR SPACE (BOŞLUK PAYI)</text>

  <!-- ROW 3: favicon / toolbar / forbidden -->
  <g transform="translate(230,760)">
    <rect x="-180" y="-40" width="360" height="80" rx="12" fill="#eeece5"/>
    <rect x="-165" y="-24" width="90" height="48" rx="10" fill="#FAFAF8"/>
    <g transform="translate(-120,0) scale(0.16)"><use href="#mark"/></g>
    <rect x="-60" y="-24" width="205" height="48" rx="24" fill="#ffffff" stroke="#ddd9cc" stroke-width="1"/>
    <text x="-35" y="6" font-family="Georgia, serif" font-size="14" fill="#8f8d84">beiwe.app</text>
  </g>
  <text x="230" y="850" text-anchor="middle" class="cap">FAVICON / TARAYICI SEKMESİ</text>

  <g transform="translate(560,760)">
    <g transform="scale(1,0.55)"><use href="#mark" transform="scale(0.62)"/></g>
    <line x1="-70" y1="-70" x2="70" y2="70" stroke="#c0432c" stroke-width="4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#c0432c" stroke-width="4"/>
  </g>
  <text x="560" y="850" text-anchor="middle" class="cap">ORANLARI BOZMA</text>

  <g transform="translate(830,760)">
    <g transform="scale(0.62)">
      <rect x="-88" y="-108" width="32" height="216" rx="16" fill="#171717"/>
      <ellipse cx="20" cy="-48" rx="78" ry="58" fill="#171717"/>
      <ellipse cx="24" cy="50" rx="84" ry="62" fill="#171717"/>
      <path d="M -16,-56 L 8,56 L 32,-8 L 56,56 L 84,-56" fill="none" stroke="#4B6FD8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <line x1="-70" y1="-70" x2="70" y2="70" stroke="#c0432c" stroke-width="4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#c0432c" stroke-width="4"/>
  </g>
  <text x="830" y="850" text-anchor="middle" class="cap">VURGU RENGİNİ DEĞİŞTİRME</text>

  <g transform="translate(1100,760)">
    <g transform="rotate(28) scale(0.62)"><use href="#mark"/></g>
    <line x1="-70" y1="-70" x2="70" y2="70" stroke="#c0432c" stroke-width="4"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#c0432c" stroke-width="4"/>
  </g>
  <text x="1100" y="850" text-anchor="middle" class="cap">DÖNDÜRME / EĞME</text>

  <!-- ROW 4: colors + book cover -->
  <g transform="translate(150,960)">
    <rect x="-70" y="-35" width="140" height="70" rx="10" fill="#171717"/>
    <text x="0" y="60" text-anchor="middle" class="hex">#171717 — Ink</text>
  </g>
  <g transform="translate(430,960)">
    <rect x="-70" y="-35" width="140" height="70" rx="10" fill="#D98A26"/>
    <text x="0" y="60" text-anchor="middle" class="hex">#D98A26 — Burnt Orange</text>
  </g>
  <g transform="translate(710,960)">
    <rect x="-70" y="-35" width="140" height="70" rx="10" fill="#FAFAF8" stroke="#e5e2d8" stroke-width="2"/>
    <text x="0" y="60" text-anchor="middle" class="hex">#FAFAF8 — Kağıt</text>
  </g>
  <g transform="translate(990,960)">
    <rect x="-70" y="-35" width="140" height="70" rx="10" fill="#1FA34A"/>
    <text x="0" y="60" text-anchor="middle" class="hex">#1FA34A — Uzlaşı (Yeşil)</text>
  </g>

  <g transform="translate(1220,960)">
    <rect x="-95" y="-95" width="190" height="230" rx="18" fill="#171717"/>
    <path d="M -50,-50 L -25,55 L 0,-10 L 25,55 L 50,-50"
          transform="translate(0,-25) scale(0.85)"
          fill="none" stroke="#FAFAF8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="65" text-anchor="middle" class="word-lg" font-size="26">Beiwe Book</text>
    <text x="0" y="90" text-anchor="middle" class="sub" font-size="13">The Constitution of Clarity</text>
  </g>
  <text x="1220" y="1105" text-anchor="middle" class="cap">KİTAP KAPAĞI — W BAĞIMSIZ KULLANIM</text>

  <!-- ROW 5: Construction grid + Optical alignment demo -->
  <g transform="translate(300,1250)">
    <!-- 8px grid overlay, drawn at icon's working scale (0.62) -->
    <g clip-path="none">
      <g>
        <!-- vertical grid lines every 8 grid-units * 0.62 scale spacing (approx) -->
        <g stroke="#e3e0d5" stroke-width="0.75">
          <line x1="-140" y1="-140" x2="-140" y2="140"/>
          <line x1="-105" y1="-140" x2="-105" y2="140"/>
          <line x1="-70" y1="-140" x2="-70" y2="140"/>
          <line x1="-35" y1="-140" x2="-35" y2="140"/>
          <line x1="0" y1="-140" x2="0" y2="140"/>
          <line x1="35" y1="-140" x2="35" y2="140"/>
          <line x1="70" y1="-140" x2="70" y2="140"/>
          <line x1="105" y1="-140" x2="105" y2="140"/>
          <line x1="140" y1="-140" x2="140" y2="140"/>
          <line x1="-140" y1="-140" x2="140" y2="-140"/>
          <line x1="-140" y1="-105" x2="140" y2="-105"/>
          <line x1="-140" y1="-70" x2="140" y2="-70"/>
          <line x1="-140" y1="-35" x2="140" y2="-35"/>
          <line x1="-140" y1="0" x2="140" y2="0"/>
          <line x1="-140" y1="35" x2="140" y2="35"/>
          <line x1="-140" y1="70" x2="140" y2="70"/>
          <line x1="-140" y1="105" x2="140" y2="105"/>
          <line x1="-140" y1="140" x2="140" y2="140"/>
        </g>
      </g>
      <g transform="scale(0.62)"><use href="#mark"/></g>
    </g>
  </g>
  <text x="300" y="1420" text-anchor="middle" class="cap">İNŞA GRID'İ (8PX)</text>

  <g transform="translate(700,1250)">
    <!-- mathematical bounding box: thin dashed -->
    <rect x="-90" y="-90" width="180" height="180" fill="none" stroke="#c9c6bb" stroke-width="1.2" stroke-dasharray="4 4"/>
    <!-- optical bounding box: slightly larger on the round (right/bottom) side -->
    <rect x="-92" y="-92" width="188" height="188" fill="none" stroke="#D98A26" stroke-width="1.4" stroke-dasharray="2 3"/>
    <g transform="scale(0.62)"><use href="#mark"/></g>
    <text x="0" y="120" text-anchor="middle" class="note">gri: matematiksel kutu · turuncu: optik kutu</text>
  </g>
  <text x="700" y="1420" text-anchor="middle" class="cap">OPTİK HİZALAMA</text>

  <g transform="translate(1080,1260)">
    <!-- stroke-draw animation storyboard: 3 frames -->
    <g transform="translate(-160,0) scale(0.34)">
      <rect x="-88" y="-108" width="32" height="216" rx="16" fill="#171717" opacity="0.35"/>
      <ellipse cx="20" cy="-48" rx="78" ry="58" fill="#171717" opacity="0.35"/>
      <ellipse cx="24" cy="50" rx="84" ry="62" fill="#171717" opacity="0.35"/>
    </g>
    <text x="-160" y="90" text-anchor="middle" class="note" font-size="11">1 · gövde fade-in</text>

    <g transform="translate(0,0) scale(0.34)">
      <rect x="-88" y="-108" width="32" height="216" rx="16" fill="#171717"/>
      <ellipse cx="20" cy="-48" rx="78" ry="58" fill="#171717"/>
      <ellipse cx="24" cy="50" rx="84" ry="62" fill="#171717"/>
      <path d="M -16,-56 L 8,56 L 32,-8" fill="none" stroke="#D98A26" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="0" y="90" text-anchor="middle" class="note" font-size="11">2 · W stroke-draw</text>

    <g transform="translate(160,0) scale(0.34)">
      <use href="#mark"/>
    </g>
    <text x="160" y="90" text-anchor="middle" class="note" font-size="11">3 · tamamlandı</text>
  </g>
  <text x="1080" y="1420" text-anchor="middle" class="cap">AÇILIŞ ANİMASYONU (STORYBOARD)</text>
</svg>
